<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Ascend NYC — Admin · Email List</title>
  <style>
    :root {
      --bg: #0c0d10;
      --panel: #15171c;
      --panel-2: #1c1f26;
      --line: #2a2e38;
      --text: #f4f5f7;
      --muted: #9aa0ac;
      --accent: #f5a524;
      --danger: #ff6b6b;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font: 15px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    a { color: var(--accent); }
    .wrap { max-width: 1080px; margin: 0 auto; padding: 40px 20px 80px; }
    h1 { font-size: 22px; margin: 0; letter-spacing: -0.01em; }
    .sub { color: var(--muted); font-size: 13px; margin-top: 4px; }

    /* ----- Login gate ----- */
    .gate {
      max-width: 380px; margin: 12vh auto 0; padding: 32px;
      background: var(--panel); border: 1px solid var(--line); border-radius: 14px;
    }
    .gate h1 { margin-bottom: 6px; }
    .gate p { color: var(--muted); font-size: 13px; margin: 0 0 20px; }
    label { display: block; font-size: 12px; color: var(--muted); margin: 0 0 6px; text-transform: uppercase; letter-spacing: 0.06em; }
    input[type="password"] {
      width: 100%; padding: 12px 14px; border-radius: 10px;
      background: var(--panel-2); border: 1px solid var(--line); color: var(--text);
      font-size: 15px; outline: none;
    }
    input[type="password"]:focus { border-color: var(--accent); }
    .btn {
      display: inline-flex; align-items: center; gap: 8px; cursor: pointer;
      padding: 11px 18px; border-radius: 10px; border: 1px solid var(--line);
      background: var(--panel-2); color: var(--text); font-size: 14px; font-weight: 600;
    }
    .btn:hover { border-color: var(--accent); }
    .btn--primary { background: var(--accent); color: #1a1300; border-color: var(--accent); width: 100%; justify-content: center; margin-top: 18px; }
    .btn--primary:hover { filter: brightness(1.05); }
    .btn[disabled] { opacity: 0.55; cursor: default; }
    .err { color: var(--danger); font-size: 13px; min-height: 18px; margin-top: 12px; }

    /* ----- Dashboard ----- */
    .hidden { display: none !important; }
    .topbar { display: flex; align-items: flex-end; justify-content: space-between; gap: 16px; flex-wrap: wrap; margin-bottom: 24px; }
    .actions { display: flex; gap: 10px; flex-wrap: wrap; }
    .stats { display: flex; gap: 12px; margin-bottom: 18px; flex-wrap: wrap; }
    .stat { background: var(--panel); border: 1px solid var(--line); border-radius: 12px; padding: 14px 18px; min-width: 120px; }
    .stat__num { font-size: 26px; font-weight: 700; letter-spacing: -0.02em; }
    .stat__label { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-top: 2px; }

    .tablewrap { border: 1px solid var(--line); border-radius: 12px; overflow: hidden; background: var(--panel); }
    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    thead th {
      text-align: left; font-size: 11px; text-transform: uppercase; letter-spacing: 0.07em;
      color: var(--muted); padding: 12px 16px; background: var(--panel-2); border-bottom: 1px solid var(--line);
      position: sticky; top: 0;
    }
    tbody td { padding: 12px 16px; border-bottom: 1px solid var(--line); vertical-align: top; }
    tbody tr:last-child td { border-bottom: 0; }
    tbody tr:hover { background: var(--panel-2); }
    td.email { font-weight: 600; }
    td.muted, .pill { color: var(--muted); }
    .pill { display: inline-block; font-size: 11px; padding: 2px 8px; border: 1px solid var(--line); border-radius: 999px; }
    .empty { padding: 48px 16px; text-align: center; color: var(--muted); }
    .search { padding: 10px 14px; border-radius: 10px; background: var(--panel-2); border: 1px solid var(--line); color: var(--text); font-size: 14px; outline: none; min-width: 220px; }
    .search:focus { border-color: var(--accent); }
  </style>
</head>
<body>
  <!-- ============ Password gate ============ -->
  <section class="gate" id="gate">
    <h1>Admin access</h1>
    <p>Enter the admin password to view the email list.</p>
    <form id="loginForm">
      <label for="pw">Password</label>
      <input type="password" id="pw" autocomplete="current-password" autofocus />
      <div class="err" id="loginErr" role="alert"></div>
      <button type="submit" class="btn btn--primary" id="loginBtn">Unlock</button>
    </form>
  </section>

  <!-- ============ Dashboard ============ -->
  <main class="wrap hidden" id="dash">
    <div class="topbar">
      <div>
        <h1>Email list</h1>
        <div class="sub" id="subline">Collected from the website signup forms.</div>
      </div>
      <div class="actions">
        <input class="search" id="search" type="search" placeholder="Search email / company…" />
        <button class="btn" id="refreshBtn">Refresh</button>
        <button class="btn" id="csvBtn">Export CSV</button>
        <button class="btn" id="logoutBtn">Lock</button>
      </div>
    </div>

    <div class="stats">
      <div class="stat"><div class="stat__num" id="statTotal">0</div><div class="stat__label">Total</div></div>
      <div class="stat"><div class="stat__num" id="statHero">0</div><div class="stat__label">Hero form</div></div>
      <div class="stat"><div class="stat__num" id="statInvite">0</div><div class="stat__label">Invite form</div></div>
    </div>

    <div class="tablewrap">
      <table>
        <thead>
          <tr><th>Email</th><th>Company</th><th>Industry</th><th>Source</th><th>Signed up</th></tr>
        </thead>
        <tbody id="rows"></tbody>
      </table>
      <div class="empty hidden" id="empty">No emails yet.</div>
    </div>
  </main>

  <script>
    (function () {
      'use strict';
      var gate = document.getElementById('gate');
      var dash = document.getElementById('dash');
      var loginForm = document.getElementById('loginForm');
      var pwInput = document.getElementById('pw');
      var loginErr = document.getElementById('loginErr');
      var loginBtn = document.getElementById('loginBtn');

      var rowsEl = document.getElementById('rows');
      var emptyEl = document.getElementById('empty');
      var searchEl = document.getElementById('search');

      // Password is kept only in memory for this tab — never persisted.
      var password = null;
      var data = [];

      function esc(s) {
        return String(s == null ? '' : s)
          .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
      }

      function fmtDate(iso) {
        if (!iso) return '';
        var d = new Date(iso);
        if (isNaN(d)) return esc(iso);
        return d.toLocaleString('en-US', {
          year: 'numeric', month: 'short', day: 'numeric',
          hour: 'numeric', minute: '2-digit'
        });
      }

      async function load() {
        var res = await fetch('/api/emails', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({password: password})
        });
        if (res.status === 401) { throw new Error('unauthorized'); }
        if (!res.ok) { throw new Error('Server error ' + res.status); }
        var json = await res.json();
        data = Array.isArray(json.subscribers) ? json.subscribers : [];
        render();
      }

      function render() {
        var q = (searchEl.value || '').trim().toLowerCase();
        var list = !q ? data : data.filter(function (r) {
          return (r.email || '').toLowerCase().indexOf(q) > -1 ||
                 (r.company || '').toLowerCase().indexOf(q) > -1;
        });

        document.getElementById('statTotal').textContent = data.length;
        document.getElementById('statHero').textContent = data.filter(function (r) { return r.source === 'hero'; }).length;
        document.getElementById('statInvite').textContent = data.filter(function (r) { return r.source === 'invite'; }).length;

        if (!list.length) {
          rowsEl.innerHTML = '';
          emptyEl.classList.remove('hidden');
          emptyEl.textContent = data.length ? 'No matches.' : 'No emails yet.';
          return;
        }
        emptyEl.classList.add('hidden');
        rowsEl.innerHTML = list.map(function (r) {
          return '<tr>' +
            '<td class="email">' + esc(r.email) + '</td>' +
            '<td' + (r.company ? '' : ' class="muted"') + '>' + (r.company ? esc(r.company) : '—') + '</td>' +
            '<td' + (r.industry ? '' : ' class="muted"') + '>' + (r.industry ? esc(r.industry) : '—') + '</td>' +
            '<td><span class="pill">' + esc(r.source || 'website') + '</span></td>' +
            '<td class="muted">' + fmtDate(r.created_at) + '</td>' +
          '</tr>';
        }).join('');
      }

      function toCsv() {
        var head = ['email', 'company', 'industry', 'source', 'created_at'];
        var lines = [head.join(',')];
        data.forEach(function (r) {
          var row = head.map(function (k) {
            var v = r[k] == null ? '' : String(r[k]);
            return '"' + v.replace(/"/g, '""') + '"';
          });
          lines.push(row.join(','));
        });
        return lines.join('\r\n');
      }

      function downloadCsv() {
        var blob = new Blob([toCsv()], {type: 'text/csv;charset=utf-8'});
        var url = URL.createObjectURL(blob);
        var a = document.createElement('a');
        a.href = url;
        a.download = 'ascend-emails.csv';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
      }

      loginForm.addEventListener('submit', async function (e) {
        e.preventDefault();
        loginErr.textContent = '';
        password = pwInput.value;
        if (!password) { loginErr.textContent = 'Enter the password.'; return; }
        loginBtn.disabled = true; loginBtn.textContent = 'Checking…';
        try {
          await load();
          gate.classList.add('hidden');
          dash.classList.remove('hidden');
        } catch (err) {
          password = null;
          loginErr.textContent = err.message === 'unauthorized'
            ? 'Incorrect password.'
            : 'Could not connect. Try again.';
        } finally {
          loginBtn.disabled = false; loginBtn.textContent = 'Unlock';
        }
      });

      document.getElementById('refreshBtn').addEventListener('click', function () {
        load().catch(function () { /* keep current view on transient error */ });
      });
      document.getElementById('csvBtn').addEventListener('click', downloadCsv);
      searchEl.addEventListener('input', render);
      document.getElementById('logoutBtn').addEventListener('click', function () {
        password = null; data = []; rowsEl.innerHTML = '';
        pwInput.value = '';
        dash.classList.add('hidden'); gate.classList.remove('hidden');
        pwInput.focus();
      });
    })();
  </script>
</body>
</html>
